<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- rounded app-icon background -->
  <rect x="1.5" y="1.5" width="61" height="61" rx="14" fill="#FBF3DE" stroke="#2A2440" stroke-width="2.5"/>
  <!-- the cozy house, centered in the icon -->
  <g transform="translate(2, 2)">
    <!-- roof -->
    <path d="M8 30 L 30 12 L 52 30" stroke="#2A2440" stroke-width="2.5" fill="#FFC9A8"/>
    <!-- chimney -->
    <path d="M40 14 L 40 8 L 44 8 L 44 18" stroke="#2A2440" stroke-width="2" fill="#FFE38A"/>
    <!-- body -->
    <path d="M12 30 L 12 50 L 48 50 L 48 30 Z" stroke="#2A2440" stroke-width="2.5" fill="#FFFCF1"/>
    <!-- door -->
    <path d="M26 50 L 26 38 C 26 36, 28 35, 30 35 C 32 35, 34 36, 34 38 L 34 50 Z" stroke="#2A2440" stroke-width="2" fill="#C1E8C8"/>
    <!-- doorknob -->
    <circle cx="32" cy="43" r="0.8" fill="#2A2440"/>
    <!-- left window -->
    <rect x="15.5" y="34" width="7" height="7" stroke="#2A2440" stroke-width="1.5" fill="#BDDEFF"/>
    <path d="M19 34 L 19 41 M15.5 37.5 L 22.5 37.5" stroke="#2A2440" stroke-width="1"/>
    <!-- right window -->
    <rect x="38" y="34" width="7" height="7" stroke="#2A2440" stroke-width="1.5" fill="#BDDEFF"/>
    <path d="M41.5 34 L 41.5 41 M38 37.5 L 45 37.5" stroke="#2A2440" stroke-width="1"/>
  </g>
</svg>
